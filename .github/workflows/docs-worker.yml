name: docs-worker

on:
  push:
    branches:
      - main
    paths:
      - "astro.config.mjs"
      - "package.json"
      - "bun.lock"
      - "tsconfig.json"
      - "public/**"
      - "src/**"
      - "wrangler.docs.jsonc"
      - ".github/workflows/docs-worker.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy-docs-worker:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.14"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Validate docs site
        run: bun run check

      - name: Deploy docs worker
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: bun run deploy:docs
