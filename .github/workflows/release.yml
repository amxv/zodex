name: release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-release:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            archive_name: zodex-x86_64-unknown-linux-gnu
            os: ubuntu-22.04
          - target: aarch64-apple-darwin
            archive_name: zodex-aarch64-apple-darwin
            os: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          target: ${{ matrix.target }}

      - name: Build release binaries
        run: |
          cargo build --locked --release --target "${{ matrix.target }}" \
            --bin zodex-client \
            --bin zodex \
            --bin zodex-agent \
            --bin git-remote-zodex \
            --bin zodexd \
            --bin zodex-prd

      - name: Package release archive
        run: |
          mkdir -p "dist/${{ matrix.archive_name }}"
          cp "target/${{ matrix.target }}/release/zodex-client" "dist/${{ matrix.archive_name }}/"
          cp "target/${{ matrix.target }}/release/zodex" "dist/${{ matrix.archive_name }}/"
          cp "target/${{ matrix.target }}/release/zodex-agent" "dist/${{ matrix.archive_name }}/"
          cp "target/${{ matrix.target }}/release/git-remote-zodex" "dist/${{ matrix.archive_name }}/"
          cp "target/${{ matrix.target }}/release/zodexd" "dist/${{ matrix.archive_name }}/"
          cp "target/${{ matrix.target }}/release/zodex-prd" "dist/${{ matrix.archive_name }}/"
          tar -C dist -czf "dist/${{ matrix.archive_name }}.tar.gz" "${{ matrix.archive_name }}"
          (
            cd dist
            sha256sum "${{ matrix.archive_name }}.tar.gz" > "${{ matrix.archive_name }}.tar.gz.sha256"
          )

      - name: Upload workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.archive_name }}
          path: |
            dist/${{ matrix.archive_name }}.tar.gz
            dist/${{ matrix.archive_name }}.tar.gz.sha256

      - name: Publish GitHub release assets
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/${{ matrix.archive_name }}.tar.gz
            dist/${{ matrix.archive_name }}.tar.gz.sha256
